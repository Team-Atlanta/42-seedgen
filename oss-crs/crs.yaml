name: seedgen
type:
  - bug-finding
version: "1.0.0"
docker_registry: ghcr.io/Team-Atlanta/42-seedgen

prepare_phase:
  hcl: oss-crs/docker-bake.hcl

target_build_phase:
  - name: build
    dockerfile: oss-crs/dockerfiles/builder.Dockerfile
    outputs:
      - harness
      - compile-commands
      - source-tree

crs_run_phase:
  runner:
    dockerfile: oss-crs/dockerfiles/runner.Dockerfile

run:
  image: seedgen-runner:latest
  env:
    - NUM_SEEDS
  inputs:
    - harness
    - compile-commands
    - source-tree
  outputs:
    - name: seed
      type: seed

supported_target:
  mode:
    - full
  language:
    - c
    - c++
    - jvm
  sanitizer:
    - address
  architecture:
    - x86_64
